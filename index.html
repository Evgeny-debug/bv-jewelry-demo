<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BV-jewelry | Heritage since 1984</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@200;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #0a0a0a;
            --gold-gradient: linear-gradient(135deg, #fbf2c6 0%, #d4af37 35%, #b68d40 60%, #fbf2c6 100%);
            --gold-muted: #c5a059;
            --white: #ffffff;
            --text-gray: #888;
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        html { scroll-behavior: smooth; }
        body { background-color: var(--bg-deep); font-family: 'Inter', sans-serif; color: var(--text-gray); overflow-x: hidden; line-height: 1.6; }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; height: 100px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 6%; z-index: 2000; transition: var(--transition);
            background: linear-gradient(to bottom, rgba(0,0,0,0.8) 0%, transparent 100%);
        }
        header.scrolled {
            height: 80px; background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(197, 160, 89, 0.15);
        }

        /* LOGO с Playfair Display */
        .bv-logo {
            display: flex; flex-direction: column; align-items: center; text-decoration: none;
            -webkit-box-reflect: below -2px linear-gradient(transparent, rgba(255, 255, 255, 0.1));
        }
        .bv-logo span:first-child {
            font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 600;
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 3px; line-height: 0.9;
        }
        .bv-logo span:last-child {
            font-family: 'Inter', sans-serif; font-size: 9px; text-transform: uppercase; 
            letter-spacing: 7px; color: var(--white); margin-top: 5px; opacity: 0.8;
        }

        .header-right { display: flex; align-items: center; gap: 25px; }
        .lang-switch { display: flex; gap: 12px; font-size: 10px; }
        .lang-btn { cursor: pointer; color: #444; transition: 0.3s; padding: 4px 0; border-bottom: 1px solid transparent; }
        .lang-btn.active { color: var(--gold-muted); border-color: var(--gold-muted); }

        .burger { width: 26px; height: 12px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .burger span { width: 100%; height: 1px; background: var(--white); transition: var(--transition); }
        .burger.open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); background: var(--gold-muted); }
        .burger.open span:nth-child(2) { transform: translateY(-5.5px) rotate(-45deg); background: var(--gold-muted); }

        /* --- HERO --- */
        .hero { position: relative; width: 100%; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1573408301185-9146fe634ad0?q=80&w=1920&auto=format&fit=crop');
            background-size: cover; background-position: center; transform: scale(1.1); transition: 3s ease-out;
        }
        .hero-content { position: relative; z-index: 5; text-align: center; }
        .hero-content h1 {
            font-family: 'Playfair Display', serif; font-size: clamp(48px, 12vw, 100px);
            font-weight: 400; letter-spacing: 10px; text-transform: uppercase;
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 40px rgba(0,0,0,0.6); opacity: 0; transform: translateY(30px); animation: fadeUp 1.8s forwards 0.5s;
        }

        /* DISCOVER INDICATOR */
        .scroll-indicator {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; cursor: pointer; z-index: 10;
        }
        .scroll-indicator p { font-size: 9px; text-transform: uppercase; letter-spacing: 4px; color: var(--gold-muted); margin-bottom: 12px; }
        .mouse { width: 1px; height: 60px; background: rgba(197, 160, 89, 0.2); position: relative; overflow: hidden; }
        .mouse::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--gold-muted); animation: scroll-anim 2.5s infinite; }
        @keyframes scroll-anim { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        /* --- CATALOG (4-COLUMN) --- */
        .catalog { padding: 120px 6% 80px; }
        .catalog-title { 
            font-family: 'Playfair Display', serif; font-size: 42px; text-align: center; 
            margin-bottom: 60px; color: var(--gold-muted); font-weight: 400; letter-spacing: 3px;
        }
        .product-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        
        .item-card { 
            background: #0d0d0d; border: 1px solid rgba(255,255,255,0.03); 
            aspect-ratio: 1/1.3; transition: var(--transition); 
            position: relative; display: flex; flex-direction: column; 
            justify-content: flex-end; overflow: hidden; cursor: pointer;
        }
        .item-card:hover { transform: translateY(-8px); border-color: rgba(197, 160, 89, 0.3); }
        .item-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; font-size: 8px; color: #151515; }
        .item-info { position: relative; z-index: 2; padding: 25px; background: linear-gradient(to top, #0d0d0d 50%, transparent); }
        .item-info h3 { font-family: 'Inter'; font-size: 13px; font-weight: 400; color: var(--white); text-transform: uppercase; letter-spacing: 1px; }
        .item-price { color: var(--gold-muted); font-size: 12px; margin-top: 8px; }

        /* --- FOOTER --- */
        footer { padding: 100px 6%; background: #080808; border-top: 1px solid rgba(197, 160, 89, 0.1); text-align: center; }
        footer h2 { font-family: 'Playfair Display', serif; font-size: 38px; color: var(--gold-muted); font-weight: 400; margin-bottom: 40px; }
        .f-contact a { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--white); text-decoration: none; transition: 0.3s; }
        .f-social { display: flex; justify-content: center; gap: 40px; margin-top: 40px; }
        .f-social a { font-size: 11px; text-transform: uppercase; letter-spacing: 3px; color: var(--gold-muted); text-decoration: none; padding-bottom: 5px; border-bottom: 1px solid transparent; transition: 0.3s; }
        .f-social a:hover { color: var(--white); border-color: var(--white); }

        /* --- FULL MENU --- */
        .full-menu {
            position: fixed; top: 0; left: 0; width: 100%; height: 100vh;
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1500; clip-path: circle(0% at 93% 5%); transition: 0.8s cubic-bezier(0.77, 0, 0.175, 1);
        }
        .full-menu.active { clip-path: circle(150% at 93% 5%); }
        .full-menu a { font-family: 'Playfair Display', serif; font-size: 45px; color: var(--white); text-decoration: none; margin: 12px 0; font-weight: 400; letter-spacing: 3px; transition: 0.3s; }
        .full-menu a:hover { color: var(--gold-muted); transform: scale(1.05); }

        @media (max-width: 1100px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { 
            .product-grid { grid-template-columns: repeat(2, 1fr); } 
            header { height: 80px; }
            .hero-content h1 { letter-spacing: 5px; }
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header id="header">
        <a href="#home" class="bv-logo">
            <span>BV</span>
            <span>jewelry</span>
        </a>
        
        <div class="header-right">
            <div class="lang-switch">
                <span class="lang-btn active" data-lang="ru">RU</span>
                <span class="lang-btn" data-lang="ua">UA</span>
                <span class="lang-btn" data-lang="en">EN</span>
            </div>
            <div class="burger" id="burger">
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <nav class="full-menu" id="menu">
        <a href="#home" data-i18n="menu_home">Главная</a>
        <a href="#catalog" data-i18n="menu_collections">Коллекции</a>
        <a href="#contacts" data-i18n="menu_contacts">Контакты</a>
    </nav>

    <section class="hero" id="home">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-content">
            <h1>BV-jewelry</h1>
        </div>
        <div class="scroll-indicator" id="scrollBtn">
            <p data-i18n="discover">discover</p>
            <div class="mouse"></div>
        </div>
    </section>

    <section class="catalog" id="catalog">
        <h2 class="catalog-title" data-i18n="c_title">Featured Collection</h2>
        <div class="product-grid">
            <div class="item-card"><div class="item-img">BV-PIECE</div><div class="item-info"><h3 data-i18n="p_ring">Aura Ring</h3><div class="item-price" data-i18n="p_price">Upon Request</div></div></div>
            <div class="item-card"><div class="item-img">BV-PIECE</div><div class="item-info"><h3>Luna Pendant</h3><div class="item-price">18 500 грн</div></div></div>
            <div class="item-card"><div class="item-img">BV-PIECE</div><div class="item-info"><h3>Bracelet Wave</h3><div class="item-price">32 000 грн</div></div></div>
            <div class="item-card"><div class="item-img">BV-PIECE</div><div class="item-info"><h3>Custom Piece</h3><div class="item-price" data-i18n="p_price">Upon Request</div></div></div>
        </div>
    </section>

    <footer id="contacts">
        <h2 data-i18n="f_title">Inquiry & Service</h2>
        <div class="f-contact">
            <a href="tel:+380634540901">+38 063 45 40 901</a>
        </div>
        <div class="f-social">
            <a href="https://t.me/bv_jewelry_izmail" target="_blank">Telegram</a>
            <a href="https://www.instagram.com/bv.jewelry_izmail" target="_blank">Instagram</a>
        </div>
    </footer>

    <script>
        const i18n = {
            ru: { menu_home: "Главная", menu_collections: "Коллекции", menu_contacts: "Контакты", c_title: "Избранные работы", p_ring: "Кольцо Aura", p_price: "По запросу", f_title: "Консультация", discover: "открыть" },
            ua: { menu_home: "Головна", menu_collections: "Колекції", menu_contacts: "Контакти", c_title: "Обрані роботи", p_ring: "Каблучка Aura", p_price: "За запитом", f_title: "Консультація", discover: "відкрити" },
            en: { menu_home: "Home", menu_collections: "Collections", menu_contacts: "Contacts", c_title: "Featured Works", p_ring: "Aura Ring", p_price: "Upon Request", f_title: "Inquiry", discover: "discover" }
        };

        function setLang(lang) {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.innerText = i18n[lang][key];
            });
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            localStorage.setItem('bv_lang', lang);
        }

        const burger = document.getElementById('burger');
        const menu = document.getElementById('menu');
        const header = document.getElementById('header');
        const heroBg = document.getElementById('heroBg');
        const scrollBtn = document.getElementById('scrollBtn');

        window.onload = () => { 
            heroBg.style.transform = 'scale(1)'; 
            setLang(localStorage.getItem('bv_lang') || 'ru');
        };

        function toggleMenu() {
            burger.classList.toggle('open');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        }

        burger.onclick = (e) => { e.stopPropagation(); toggleMenu(); };
        menu.onclick = (e) => { if (e.target.tagName === 'A' || e.target === menu) toggleMenu(); };
        scrollBtn.onclick = () => { document.getElementById('catalog').scrollIntoView({ behavior: 'smooth' }); };

        window.onscroll = () => {
            let offset = window.pageYOffset;
            header.classList.toggle('scrolled', offset > 50);
            if (offset < window.innerHeight) {
                heroBg.style.transform = `scale(${1 + offset * 0.0002}) translateY(${offset * 0.1}px)`;
            }
        };

        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.onclick = () => setLang(btn.dataset.lang);
        });
    </script>
</body>
</html>
